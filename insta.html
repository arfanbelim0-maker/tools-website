<!DOCTYPE html>
<html>
<head>
<title>Instagram Downloader - QuickTools</title>

<style>
body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

.container{
margin-top:100px;
}

input{
padding:12px;
width:300px;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#ff4b2b;
color:white;
cursor:pointer;
margin-top:10px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
display:inline-block;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>📥 Instagram Video Downloader</h1>

<input type="text" id="link" placeholder="Paste Instagram Link">

<br>
<button onclick="download()">Download</button>

<div id="result"></div>
</div>

<script>
function download(){
let link = document.getElementById("link").value;

if(link == ""){
alert("Link daalo!");
return;
}

document.getElementById("result").innerHTML =
"<div class='card'>⚠️ Direct download API chahiye hoti hai (backend).<br>Abhi ke liye ye demo hai.<br><br>👉 Next step: mai API setup bhi sikha dunga</div>";
}
</script>

</body>
</html>
