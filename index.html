<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTools - All in One</title>
    <style>
        /* एनिमेटेड ग्रेडिएंट बैकग्राउंड */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero { padding: 100px 20px; }
        h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        p { font-size: 1.2rem; opacity: 0.9; }

        /* टूल्स के लिए कार्ड डिजाइन */
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            width: 250px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: white;
            color: #e73c7e;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: #333; color: white; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>QuickTools</h1>
        <p>Simple • Fast • Free</p>
    </div>

    <div class="container">
        <!-- Password Generator Card -->
        <div class="card">
            <h3>🔐 Password Generator</h3>
            <p>Create secure passwords instantly.</p>
            <a href="#" class="btn">Open Tool</a>
        </div>

        <!-- Text Repeater Card -->
        <div class="card">
            <h3>🔄 Text Repeater</h3>
            <p>Repeat any text as many times as you want.</p>
            <a href="#" class="btn">Open Tool</a>
        </div>

        <!-- Text Art (New) -->
        <div class="card">
            <h3>🎨 Text Art</h3>
            <p>Generate cool ASCII art for your projects.</p>
            <a href="#" class="btn">Open Tool</a>
        </div>
    </div>

</body>
</html>
