<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTools - All in One</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero { padding: 100px 20px; }
        h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        p { font-size: 1.2rem; opacity: 0.9; }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 250px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-10px); }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: white;
            color: #e73c7e;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: #333; color: white; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>QuickTools</h1>
        <p>Simple • Fast • Free</p>
    </div>

    <div class="container">
        <!-- Password Generator Tool -->
        <div class="card">
            <h3>🔐 Password Generator</h3>
            <p>Create secure passwords instantly.</p>
            <!-- Link updated to match your file -->
            <a href="password.html" class="btn">Open Tool</a>
        </div>

        <!-- Text Repeater Tool -->
        <div class="card">
            <h3>🔄 Text Repeater</h3>
            <p>Repeat any text as many times as you want.</p>
            <!-- Link updated to match your file -->
            <a href="repeat.html" class="btn">Open Tool</a>
        </div>

        <!-- Text Art Tool (File not found in your repo yet) -->
        <div class="card">
            <h3>🎨 Text Art</h3>
            <p>Generate cool ASCII art for your projects.</p>
            <a href="#" class="btn">Coming Soon</a>
        </div>
    </div>

</body>
</html>
