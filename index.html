<!DOCTYPE html>
<html>
<head>
  <title>QR Code Generator PRO</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body style="text-align:center; font-family:Arial; background:#f5f5f5;">

  <h1>🔥 QR Code Generator PRO</h1>

  <input type="text" id="text" placeholder="Enter text or link"
    style="padding:10px; width:250px; border-radius:5px; border:1px solid #ccc;">
  
  <br><br>

  🎨 Color: <input type="color" id="color" value="#000000">

  <br><br>

  <button onclick="generateQR()"
    style="padding:10px 20px; border:none; background:#007bff; color:white; border-radius:5px;">
    Generate QR
  </button>

  <br><br>

  <div id="qrcode"></div>

  <br>

  <button onclick="downloadQR()"
    style="padding:10px 20px; border:none; background:green; color:white; border-radius:5px;">
    Download QR
  </button>

  <script>
    function generateQR() {
      var text = document.getElementById("text").value;
      var color = document.getElementById("color").value;

      document.getElementById("qrcode").innerHTML = "";

      if (!text.startsWith("http://") && !text.startsWith("https://")) {
        if (text.includes(".")) {
          text = "https://" + text;
        }
      }

      new QRCode(document.getElementById("qrcode"), {
        text: text,
        width: 200,
        height: 200,
        colorDark: color,
        colorLight: "#ffffff"
      });
    }

    function downloadQR() {
      var img = document.querySelector("#qrcode img");
      if (img) {
        var link = document.createElement("a");
        link.href = img.src;
        link.download = "qr.png";
        link.click();
      } else {
        alert("Pehle QR generate karo!");
      }
    }
  </script>

</body>
</html>
