<!DOCTYPE html>
<html>
<head>
<title>QuickTools</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
}

.card{
  background:#1e293b;
  margin:15px;
  padding:20px;
  width:220px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:#334155;
}

a{
  text-decoration:none;
  color:white;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="header">🚀 QuickTools</div>

<div class="container">

<div class="card">
<h3>🔐 Password Generator</h3>
<p>Create strong passwords instantly</p>
<a href="password.html"><button>Open</button></a>
</div>

<div class="card">
<h3>🔊 Text to Speech</h3>
<p>Convert text into voice</p>
<a href="speech.html"><button>Open</button></a>
</div>

<div class="card">
<h3>🖼️ Image Generator</h3>
<p>Generate images from text</p>
<a href="image.html"><button>Open</button></a>
</div>

</div>

</body>
</html>
