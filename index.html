<!DOCTYPE html>
<html>
<head>
 <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9089976127340402"
     crossorigin="anonymous"></script> 
<title>QuickTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(270deg,#667eea,#764ba2,#ff6a00);
  background-size:600% 600%;
  animation: bg 10s ease infinite;
  color:white;
}

/* Background animation */
@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

/* Hero */
.hero{
  text-align:center;
  margin-top:80px;
}

.hero h1{
  font-size:40px;
}

.hero p{
  opacity:0.8;
}

.btn{
  margin-top:20px;
  padding:12px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

/* Tools */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:50px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  margin:15px;
  padding:20px;
  width:220px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
}

.card a{
  text-decoration:none;
  color:white;
}

.card button{
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🚀 QuickTools</div>
</div>

<div class="hero">
<h1>All Tools in One Place</h1>
<p>Simple • Fast • Free</p>
<button class="btn" onclick="scrollToTools()">Get Started</button>
</div>

<div class="container" id="tools">

<div class="card">
<h3>🔐 Password Generator</h3>
<a href="password.html"><button>Open</button></a>
</div>

<div class="card">
<h3>🔁 Text Repeater</h3>
<a href="repeat.html"><button>Open</button></a>
</div>

<div class="card">
<h3><button>Open</button></a>
</div>

</div>

<script>
function scrollToTools(){
  document.getElementById("tools").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
