<!DOCTYPE html>
<html>
<head>
<title>Text Repeater</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color: white;
  text-align: center;
  padding: 50px;
}
input, button {
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 5px;
}
button {
  background: black;
  color: white;
  cursor: pointer;
}
textarea {
  width: 80%;
  height: 200px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Text Repeater</h1>

<input id="text" placeholder="Enter text">
<input id="count" type="number" placeholder="Enter number">

<br>

<button onclick="repeatText()">Start</button>

<textarea id="output"></textarea>

<script>
function repeatText() {
  let text = document.getElementById("text").value;
  let count = document.getElementById("count").value;
  let result = "";

  for (let i = 0; i < count; i++) {
    result += text + "\n";
  }

  document.getElementById("output").value = result;
}
</script>

</body>
</html>
