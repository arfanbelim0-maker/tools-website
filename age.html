<!DOCTYPE html>
<html>
<head>
  <title>QuickTool - Age Calculator</title>
</head>

<body style="font-family:Arial; text-align:center; background:#f4f6f8;">

  <h1>🎂 Age Calculator</h1>

  <input type="date" id="dob" style="padding:10px;">
  <br><br>

  <button onclick="calculateAge()" 
  style="padding:10px 20px; background:#007bff; color:white; border:none;">
  Calculate Age
  </button>

  <h2 id="result"></h2>

<script>
function calculateAge() {
  let dob = new Date(document.getElementById("dob").value);
  let today = new Date();

  let age = today.getFullYear() - dob.getFullYear();
  let m = today.getMonth() - dob.getMonth();

  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
    age--;
  }

  document.getElementById("result").innerText = "Your Age: " + age + " years";
}
</script>

</body>
</html>
