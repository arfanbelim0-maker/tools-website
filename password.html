
<!DOCTYPE html>
<html>
<head>
    <title>Password Generator PRO</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f0f2f5;">

    <h1>🔐 Password Generator PRO</h1>

    <input type="number" id="length" placeholder="Enter length (e.g. 8)"
    style="padding:10px; border-radius:5px; border:1px solid #ccc;">

    <br><br>

    <button onclick="generatePassword()"
    style="padding:10px 20px; background:#007bff; color:white; border:none; border-radius:5px;">
    Generate Password
    </button>

    <br><br>

    <div id="result"
    style="max-width:90%; margin:auto; word-wrap:break-word; background:white; padding:10px; border-radius:5px; border:1px solid #ccc;">
    </div>

    <script>
    function generatePassword() {
        let length = document.getElementById("length").value;

        let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";

        let password = "";

        for (let i = 0; i < length; i++) {
            password += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        document.getElementById("result").innerText = password;
    }
    </script>

</body>
</html>
