<!DOCTYPE html>
<html>
<head>
  <title>QuickTool - Password Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .box {
      background: white;
      color: black;
      width: 320px;
      margin: 100px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
      word-break: break-all;
    }
  </style>

</head>

<body>

  <div class="box">
    <h2>🔐 Password Generator</h2>

    <input type="number" id="length" placeholder="Length (8-16)">
    <br><br>

    <button onclick="generatePassword()">Generate</button>

    <div id="result">••••••••</div>
  </div>

<script>
function generatePassword() {
  let length = document.getElementById("length").value;

  if(length < 4 || length > 20){
    alert("Enter length between 4 to 20");
    return;
  }

  let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
  let password = "";

  for (let i = 0; i < length; i++) {
    password += chars.charAt(Math.floor(Math.random() * chars.length));
  }

  document.getElementById("result").innerText = password;
}
</script>

</body>
</html>
