<!DOCTYPE html>
<html>
<head>
<title>Password Generator</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  padding-top:80px;
}

input,button{
  padding:10px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#result{
  margin-top:20px;
  background:white;
  color:black;
  padding:10px;
  display:inline-block;
  border-radius:8px;
}
</style>

</head>

<body>

<h1>🔐 Password Generator</h1>

<input id="length" type="number" placeholder="Enter number">

<br>

<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
function generate(){
  let len = document.getElementById("length").value;

  if(len == "" || len <= 0){
    alert("Number daalo");
    return;
  }

  // max limit
  if(len > 16){
    len = 16;
  }

  let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%";
  let pass = "";

  for(let i=0;i<len;i++){
    pass += chars[Math.floor(Math.random()*chars.length)];
  }

  document.getElementById("result").innerText = pass;
}
</script>

</body>
</html>
