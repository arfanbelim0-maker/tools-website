<!DOCTYPE html>
<html>
<head>
<title>QuickTools - Speech</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:20px;
  width:300px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

input,select{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px;
  width:100%;
  background:#667eea;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>🔊 Text to Speech</h2>

<input id="text" placeholder="Text likho">

<select id="voice"></select>

<button onclick="speak()">Speak</button>
</div>

<script>
let voices = [];

function loadVoices(){
  voices = speechSynthesis.getVoices();
  let select = document.getElementById("voice");
  select.innerHTML = "";

  voices.forEach((v,i)=>{
    select.innerHTML += `<option value="${i}">${v.name} (${v.lang})</option>`;
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak(){
  let text = document.getElementById("text").value;
  let voiceIndex = document.getElementById("voice").value;

  let msg = new SpeechSynthesisUtterance(text);
  msg.voice = voices[voiceIndex];

  speechSynthesis.cancel(); // old voice stop
  speechSynthesis.speak(msg);
}
</script>

</body>
</html>
