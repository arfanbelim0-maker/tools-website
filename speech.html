<!DOCTYPE html>
<html>
<head>
<title>QuickTools - Speech Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:420px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
  padding:10px;
  border:none;
  border-radius:8px;
}

select, input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}

.play{background:#22c55e;color:white;}
.stop{background:#ef4444;color:white;}
</style>

</head>

<body>

<div class="box">

<h2>🎤 Text to Speech PRO</h2>

<textarea id="text" placeholder="Type something..."></textarea>

<select id="voice"></select>

<label>Speed</label>
<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<button class="play" onclick="speak()">▶ Play</button>
<button class="stop" onclick="stop()">⏹ Stop</button>

</div>

<script>
let voices=[];

function loadVoices(){
  voices = speechSynthesis.getVoices();
  let select=document.getElementById("voice");
  select.innerHTML="";
  voices.forEach((v,i)=>{
    select.innerHTML+=`<option value="${i}">${v.name} (${v.lang})</option>`;
  });
}
speechSynthesis.onvoiceschanged = loadVoices;

function speak(){
  let text=document.getElementById("text").value;
  let voiceIndex=document.getElementById("voice").value;
  let speed=document.getElementById("speed").value;

  let msg=new SpeechSynthesisUtterance(text);
  msg.voice=voices[voiceIndex];
  msg.rate=speed;

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function stop(){
  speechSynthesis.cancel();
}
</script>

</body>
</html>
